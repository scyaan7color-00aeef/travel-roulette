{% extends "base.html" %}

{% block title %}旅行プラン ルーレット - ランダム旅行先提案{% endblock %}

{% block content %}
<div class="page-header">
    <h1>🗾 旅行プラン ルーレット</h1>
    <p class="page-subtitle">全国47都道府県・100スポット超からランダムに旅行先を提案します</p>
</div>

<!-- ═══════════════════════════════════
     フィルターエリア
     ═══════════════════════════════════ -->
<section class="filter-section">
    <h2 class="filter-title">🔍 絞り込みフィルター</h2>

    <!-- 地方プルダウン -->
    <div class="filter-group">
        <label for="regionSelect" class="filter-label">🗺️ 地方</label>
        <select id="regionSelect" class="filter-select">
            {% for r in regions %}
            <option value="{{ r }}">{{ r }}</option>
            {% endfor %}
        </select>
    </div>

    <!-- カテゴリ チェックボックス -->
    <div class="filter-group">
        <label class="filter-label">🏷️ カテゴリ</label>
        <div class="checkbox-group">
            {% for cat in categories %}
            <label class="checkbox-label">
                <input type="checkbox" name="category" value="{{ cat }}" class="cat-checkbox">
                {{ category_emoji.get(cat, '') }} {{ cat }}
            </label>
            {% endfor %}
        </div>
    </div>

    <!-- 季節ボタン -->
    <div class="filter-group">
        <label class="filter-label">📅 季節</label>
        <div class="season-buttons">
            <button class="season-btn active" data-season="">指定なし</button>
            <button class="season-btn" data-season="春">🌸 春</button>
            <button class="season-btn" data-season="夏">☀️ 夏</button>
            <button class="season-btn" data-season="秋">🍁 秋</button>
            <button class="season-btn" data-season="冬">❄️ 冬</button>
        </div>
    </div>
</section>

<!-- ═══════════════════════════════════
     タブ切り替え
     ═══════════════════════════════════ -->
<div class="tabs">
    <button class="tab-btn active" data-tab="roulette">🎲 ランダム提案</button>
    <button class="tab-btn" data-tab="list">📋 一覧を見る</button>
</div>

<!-- ═══════════════════════════════════
     タブ1: ランダム提案
     ═══════════════════════════════════ -->
<div id="tab-roulette" class="tab-content active">
    <button id="spinBtn" class="spin-btn">🎲 おすすめの旅行先を探す</button>

    <!-- スポットカード（JS で描画） -->
    <div id="spotCard"></div>

    <!-- AdSense: ここに広告ユニットのコードを貼る -->
    <div class="ad-space">
        <!-- 広告スペース -->
    </div>
</div>

<!-- ═══════════════════════════════════
     タブ2: 一覧
     ═══════════════════════════════════ -->
<div id="tab-list" class="tab-content">
    <button id="loadListBtn" class="spin-btn secondary">📋 一覧を読み込む</button>
    <div id="spotList"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
// ═══════════════════════════════════════════════════
//  HTML生成ヘルパー（DOM不要のため外側に定義）
// ═══════════════════════════════════════════════════
const SEASON_EMOJI = { "春": "🌸", "夏": "☀️", "秋": "🍁", "冬": "❄️" };
const CATEGORY_EMOJI = {
    "歴史・文化": "🏯", "自然・絶景": "🏔️", "アウトドア": "🥾",
    "グルメ": "🍜", "温泉・癒し": "♨️", "世界遺産": "🌏", "夜景": "🌃",
};

function buildCategoryTags(categories) {
    return categories.map(c =>
        `<span class="tag">${CATEGORY_EMOJI[c] || ""} ${c}</span>`
    ).join("");
}

function buildSeasonRow(spotSeasons) {
    const allSeasons = ["春", "夏", "秋", "冬"];
    return allSeasons.map(s => {
        const good = spotSeasons.includes(s);
        return `<span class="season-badge ${good ? "season-good" : "season-off"}">${SEASON_EMOJI[s]} ${s}</span>`;
    }).join(" ");
}

function buildHighlightTags(highlights) {
    return highlights.map(h => `<span class="highlight-tag">${h}</span>`).join("");
}

function buildLinkButtons(links) {
    return links.map(lk => {
        const cls = lk.affiliate ? "btn-affiliate" : "link-btn";
        const rel = lk.affiliate ? "nofollow noopener noreferrer" : "noopener noreferrer";
        return `<a href="${lk.url}" target="_blank" rel="${rel}" class="${cls}">${lk.label}</a>`;
    }).join("");
}

function buildSpotCard(spot) {
    return `
    <div class="spot-card">
        <div class="spot-name">${spot.name}</div>
        <div class="spot-pref">📍 ${spot.pref}</div>
        <div class="spot-tags">${buildCategoryTags(spot.category)}</div>
        <hr class="spot-divider">
        <div class="season-row">${buildSeasonRow(spot.seasons)}</div>
        <p class="spot-desc">${spot.desc}</p>
        <div class="highlight-tags">${buildHighlightTags(spot.highlights)}</div>
        <div class="spot-actions">
            ${buildLinkButtons(spot.links)}
            <a href="${spot.map_url}" target="_blank" rel="noopener noreferrer" class="link-btn map-btn">🗺️ Googleマップ</a>
        </div>
        <a href="https://px.a8.net/svt/ejp?a8mat=4B1PLQ+1SBLE+14CS+BW8O2&a8ejpredirect=https%3A%2F%2Fwww.jalan.net%2F"
           rel="nofollow"
           target="_blank"
           class="btn-affiliate">
            🏨 周辺のホテルを探す（じゃらん）
        </a>
        <img border="0" width="1" height="1"
             src="https://www19.a8.net/0.gif?a8mat=4B1PLQ+1SBLE+14CS+BW8O2"
             alt=""
             style="display:none;">
    </div>`;
}

function buildAccordionItem(spot) {
    const catStr = spot.category.map(c => `${CATEGORY_EMOJI[c] || ""} ${c}`).join("　");
    const seasonStr = ["春", "夏", "秋", "冬"].map(s =>
        spot.seasons.includes(s) ? `<span class="season-good">${SEASON_EMOJI[s]}${s}</span>` : `<span class="season-off">${SEASON_EMOJI[s]}${s}</span>`
    ).join(" ");

    return `
    <div class="accordion-item">
        <div class="accordion-header">
            <span class="accordion-name">${spot.name}</span>
            <span class="accordion-pref">${spot.pref}</span>
            <span class="accordion-arrow">▼</span>
        </div>
        <div class="accordion-body">
            <p><strong>カテゴリ:</strong> ${catStr}</p>
            <p><strong>おすすめ季節:</strong> ${seasonStr}</p>
            <p class="accordion-desc">${spot.desc}</p>
            <p><strong>見どころ:</strong> ${spot.highlights.join("　／　")}</p>
            <div class="accordion-actions">
                ${buildLinkButtons(spot.links)}
                <a href="${spot.map_url}" target="_blank" rel="noopener noreferrer" class="link-btn map-btn">🗺️ Googleマップ</a>
            </div>
            <a href="https://px.a8.net/svt/ejp?a8mat=4B1PLQ+1SBLE+14CS+BW8O2&a8ejpredirect=https%3A%2F%2Fwww.jalan.net%2F"
               rel="nofollow"
               target="_blank"
               class="btn-affiliate">
                🏨 周辺のホテルを探す（じゃらん）
            </a>
            <img border="0" width="1" height="1"
                 src="https://www19.a8.net/0.gif?a8mat=4B1PLQ+1SBLE+14CS+BW8O2"
                 alt=""
                 style="display:none;">
        </div>
    </div>`;
}

// ═══════════════════════════════════════════════════
//  DOM操作はすべて DOMContentLoaded 内で実行
// ═══════════════════════════════════════════════════
document.addEventListener("DOMContentLoaded", function () {
    let selectedSeason = "";
    let listLoaded = false;

    // ── フィルター値の取得 ──
    function getFilterParams() {
        const region = document.getElementById("regionSelect").value;
        const checkedCats = [...document.querySelectorAll(".cat-checkbox:checked")].map(cb => cb.value);
        return {
            region,
            category: checkedCats.join(","),
            season: selectedSeason,
        };
    }

    function buildQueryString(params) {
        return new URLSearchParams(Object.fromEntries(
            Object.entries(params).filter(([, v]) => v !== "")
        )).toString();
    }

    // ── 季節ボタンの切り替え ──
    document.querySelectorAll(".season-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".season-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            selectedSeason = btn.dataset.season;
            listLoaded = false;
            document.getElementById("spotList").innerHTML = "";
            document.getElementById("loadListBtn").style.display = "block";
        });
    });

    // ── フィルター変更時に一覧キャッシュをリセット ──
    document.getElementById("regionSelect").addEventListener("change", () => {
        listLoaded = false;
        document.getElementById("spotList").innerHTML = "";
        document.getElementById("loadListBtn").style.display = "block";
    });
    document.querySelectorAll(".cat-checkbox").forEach(cb => {
        cb.addEventListener("change", () => {
            listLoaded = false;
            document.getElementById("spotList").innerHTML = "";
            document.getElementById("loadListBtn").style.display = "block";
        });
    });

    // ── タブ切り替え ──
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
            btn.classList.add("active");
            document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
        });
    });

    // ── ランダム提案ボタン ──
    document.getElementById("spinBtn").addEventListener("click", async () => {
        const params = getFilterParams();
        const qs = buildQueryString(params);
        const cardEl = document.getElementById("spotCard");

        cardEl.innerHTML = '<p class="loading">🎲 旅行先を探し中...</p>';

        try {
            const res = await fetch(`/api/random?${qs}`);
            if (!res.ok) {
                const err = await res.json();
                cardEl.innerHTML = `<p class="error-msg">⚠️ ${err.error || "エラーが発生しました"}</p>`;
                return;
            }
            const spot = await res.json();
            cardEl.innerHTML = buildSpotCard(spot);
            cardEl.querySelector(".spot-card").classList.add("fade-in");
        } catch (e) {
            cardEl.innerHTML = '<p class="error-msg">⚠️ 通信エラーが発生しました。しばらく待ってから再度お試しください。</p>';
        }
    });

    // ── 一覧の読み込み ──
    document.getElementById("loadListBtn").addEventListener("click", async () => {
        if (listLoaded) return;

        const params = getFilterParams();
        const qs = buildQueryString(params);
        const listEl = document.getElementById("spotList");
        const loadBtn = document.getElementById("loadListBtn");

        listEl.innerHTML = '<p class="loading">📋 一覧を読み込み中...</p>';

        try {
            const res = await fetch(`/api/spots?${qs}`);
            if (!res.ok) {
                const err = await res.json();
                listEl.innerHTML = `<p class="error-msg">⚠️ ${err.error || "エラーが発生しました"}</p>`;
                return;
            }
            const data = await res.json();

            let html = `<p class="list-count">対象スポット: <strong>${data.total}</strong>件</p>`;

            for (const [regionName, spots] of Object.entries(data.regions)) {
                html += `<h2 class="region-heading">📍 ${regionName}（${spots.length}件）</h2>`;
                html += `<div class="accordion-list">`;
                spots.forEach(spot => {
                    html += buildAccordionItem(spot);
                });
                html += `</div>`;
            }

            listEl.innerHTML = html;
            loadBtn.style.display = "none";
            listLoaded = true;

            listEl.querySelectorAll(".accordion-header").forEach(header => {
                header.addEventListener("click", () => {
                    header.parentElement.classList.toggle("open");
                });
            });
        } catch (e) {
            listEl.innerHTML = '<p class="error-msg">⚠️ 通信エラーが発生しました。しばらく待ってから再度お試しください。</p>';
        }
    });
});
</script>
{% endblock %}
