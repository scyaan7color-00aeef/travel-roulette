<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}旅行プラン ルーレット{% endblock %} | 全国47都道府県の観光地ランダム提案</title>
    <meta name="description" content="{% block description %}全国47都道府県100スポット以上からランダムに旅行先を提案する旅行プランルーレット。地方・カテゴリ・季節でフィルタリング可能。{% endblock %}">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5689524720836884" crossorigin="anonymous"></script>

    <!-- Google Fonts: Noto Serif JP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- ナビバー -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="{{ url_for('index') }}" class="navbar-brand">🗾 旅行プラン ルーレット</a>

            <!-- ハンバーガーボタン（スマホ用） -->
            <button class="hamburger" id="hamburgerBtn" aria-label="メニュー">
                <span></span><span></span><span></span>
            </button>

            <!-- ナビリンク -->
            <ul class="navbar-links" id="navbarLinks">
                <li><a href="{{ url_for('index') }}" {% if request.endpoint == 'index' %}class="active"{% endif %}>ホーム</a></li>
                <li><a href="{{ url_for('privacy') }}" {% if request.endpoint == 'privacy' %}class="active"{% endif %}>プライバシーポリシー</a></li>
                <li><a href="{{ url_for('about') }}" {% if request.endpoint == 'about' %}class="active"{% endif %}>このサイトについて</a></li>
            </ul>
        </div>
    </nav>

    <!-- メインコンテンツ -->
    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- フッター -->
    <footer class="footer">
        <div class="footer-inner">
            <p class="footer-copy">&copy;  © 2026 Justeco</p>
            <ul class="footer-links">
                <li><a href="{{ url_for('privacy') }}">プライバシーポリシー</a></li>
                <li><a href="{{ url_for('about') }}">このサイトについて</a></li>
                <li><a href="mailto:2026.justeco@gmail.com">お問い合わせ</a></li>
            </ul>
        </div>
    </footer>

    <!-- ハンバーガーメニューの開閉スクリプト -->
    <script>
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const navbarLinks = document.getElementById('navbarLinks');
        hamburgerBtn.addEventListener('click', () => {
            navbarLinks.classList.toggle('open');
            hamburgerBtn.classList.toggle('active');
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
